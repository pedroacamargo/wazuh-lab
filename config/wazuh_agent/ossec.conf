<!--
  Wazuh agent configuration for the lab victim.
-->
<ossec_config>

  <client>
    <server>
      <address>wazuh.manager</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>ubuntu, ubuntu22, ubuntu22.04</config-profile>
    <enrollment>
      <enabled>yes</enabled>
      <manager_address>wazuh.manager</manager_address>
      <port>1515</port>
    </enrollment>
  </client>

  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

  <!-- ─── Log analysis ─────────────────────────────────────── -->

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/access.log</location>
  </localfile>

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/error.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/vuln-app/app.log</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/notes-service.log</location>
  </localfile>

  <!-- ─── File integrity monitoring ────────────────────────── -->

  <syscheck>
    <disabled>no</disabled>
    <frequency>120</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>

    <directories check_all="yes" report_changes="yes" realtime="yes">/etc</directories>
    <directories check_all="yes" report_changes="yes" realtime="yes">/var/www</directories>
    <directories check_all="yes" realtime="yes">/usr/lib/cgi-bin</directories>
    <directories check_all="yes" realtime="yes">/var/lib/reports</directories>
    <directories report_changes="yes" realtime="yes">/var/www/html</directories>

    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/resolv.conf</ignore>
    <ignore>/etc/ld.so.cache</ignore>
  </syscheck>

  <!-- ─── Inventory + vuln detection feed ──────────────────── -->

  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>5m</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="yes">yes</ports>
    <processes>yes</processes>
  </wodle>

  <!-- ─── SCA ──────────────────────────────────────────────── -->

  <sca>
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>1h</interval>
  </sca>

  <!-- ─── rootcheck ────────────────────────────────────────── -->

  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>3600</frequency>
  </rootcheck>

  <!-- ─── Active response off (teaching lab) ──────────────── -->

  <active-response>
    <disabled>yes</disabled>
  </active-response>

</ossec_config>
